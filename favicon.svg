<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo de fondo oscuro con cyan borde -->
  <circle cx="60" cy="60" r="55" fill="#0f3d4d" stroke="#00d9a3" stroke-width="2"/>
  
  <!-- Tubo de ensayo (left side) -->
  <!-- Cuello del tubo -->
  <rect x="20" y="15" width="14" height="12" fill="none" stroke="#00d9a3" stroke-width="2" rx="2"/>
  
  <!-- Cuerpo del tubo -->
  <path d="M 22 27 L 18 75 Q 18 85 28 88 L 36 88 Q 46 85 46 75 L 42 27 Z" 
        fill="none" stroke="#00d9a3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Líquido en tubo (cyan) -->
  <path d="M 22 55 L 18 75 Q 18 85 28 88 L 36 88 Q 46 85 46 75 L 42 55 Z" 
        fill="#00d9a3" opacity="0.5"/>
  
  <!-- Mitocondria (right side) -->
  <!-- Forma ovalada externa -->
  <ellipse cx="70" cy="60" rx="28" ry="22" fill="none" stroke="#1eff72" stroke-width="2.5"/>
  
  <!-- Crestas internas de mitocondria (líneas diagonales) -->
  <line x1="50" y1="50" x2="90" y2="70" stroke="#1eff72" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="60" x2="90" y2="60" stroke="#1eff72" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="70" x2="90" y2="50" stroke="#1eff72" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Centro de mitocondria (matriz) -->
  <ellipse cx="70" cy="60" rx="18" ry="14" fill="none" stroke="#1eff72" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Pequeño punto luminoso (energía) -->
  <circle cx="70" cy="60" r="3" fill="#1eff72" opacity="0.8"/>
</svg>